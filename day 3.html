<!DOCTYPE html>
<html>
<head>
    <title>Simple Navigation Bar</title>

    <style>
        nav{
            background-color: rgb(173, 18, 18);
            padding: 15px;
        }

        a{
            color: rgb(247, 246, 248);
            text-decoration: none;
            margin-right: 20px;
            font-size: 18px;
        }

        a:hover{
            color: rgb(53, 21, 168);
        }
    </style>
</head>
<body>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Gallery</a>
        <a href="#">Contact</a>
    </nav>

</body>
</html>
